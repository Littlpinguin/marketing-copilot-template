# Marketing Copilot Template — Qdrant pipeline configuration
#
# This file is the single source of truth for:
#   - How the Qdrant collection is configured (dim, distance, batch)
#   - Which embedder and enrichers are active
#   - Which sources to scan and how
#   - Which functionalities (editorial calendar, email marketing, ...) map to which tool
#
# The bootstrap interview fills in the {{placeholders}} during Phase 3.
# The runbook (runbook.md in this directory) is the process documentation;
# any change to this config must be reflected in the runbook in the same commit.

qdrant:
  collection: "{{QDRANT_COLLECTION}}"
  vector_size: 3072
  distance: Cosine
  batch_size: 50

embedder:
  provider: gemini
  model: gemini-embedding-001
  output_dimensions: 3072
  task_type_ingest: RETRIEVAL_DOCUMENT
  task_type_query: RETRIEVAL_QUERY
  retry:
    max_attempts: 3
    backoff_seconds: [1, 4, 16]
  rate_limit:
    sleep_between_calls_sec: 0.2

registry:
  path: registry.json
  backup_on_write: true

logging:
  path: logs/
  level: INFO
  keep_last_n_runs: 30

# ------------------------------------------------------------------------
# Functionalities — tool-agnostic mapping
# ------------------------------------------------------------------------
# Each functionality lists which tool backs it. The connector is selected
# based on the tool name. If the tool is not in the built-in list, the
# bootstrap generates a custom connector stub. If enabled=false, the
# functionality is skipped entirely during sync.
#
# Built-in connectors currently available:
#   - editorial_calendar: notion
#   - email_marketing: (none yet — stubs for mailerlite, mailchimp, resend, brevo)
#   - knowledge_base: outline
#   - events_platform: (none yet — stub for livestorm)
#   - crm: (none yet)

functionalities:
  editorial_calendar:
    tool: "{{EDITORIAL_CALENDAR_TOOL}}"        # notion / airtable / trello / clickup / google-sheets / custom / none
    enabled: {{EDITORIAL_CALENDAR_ENABLED}}
    connector: "{{EDITORIAL_CALENDAR_TOOL}}"
    config:
      # Notion-specific
      database_id: "{{NOTION_EDITORIAL_DATABASE_ID}}"
      data_source_id: "{{NOTION_EDITORIAL_DATA_SOURCE_ID}}"
      status_filter: "{{EDITORIAL_CALENDAR_STATUS_FILTER}}"
      require_validated_checkbox: false
      # Airtable-specific (if selected)
      base_id: "{{AIRTABLE_BASE_ID}}"
      table_name: "{{AIRTABLE_TABLE_NAME}}"

  email_marketing:
    tool: "{{EMAIL_MARKETING_TOOL}}"           # mailerlite / mailchimp / resend / brevo / convertkit / custom / none
    enabled: {{EMAIL_MARKETING_ENABLED}}
    config:
      api_key_env: "{{EMAIL_MARKETING_ENV_KEY}}"
      list_id: "{{EMAIL_MARKETING_LIST_ID}}"

  knowledge_base:
    tool: "{{KNOWLEDGE_BASE_TOOL}}"            # outline / notion / confluence / gitbook / custom / none
    enabled: {{KNOWLEDGE_BASE_ENABLED}}
    connector: "{{KNOWLEDGE_BASE_TOOL}}"
    config:
      url: "{{KNOWLEDGE_BASE_URL}}"
      api_key_env: "{{KNOWLEDGE_BASE_ENV_KEY}}"
      # mapping collection name → id, filled during bootstrap
      collections: {}

  events_platform:
    tool: "{{EVENTS_PLATFORM_TOOL}}"           # livestorm / zoom / riverside / google-meet / custom / none
    enabled: {{EVENTS_PLATFORM_ENABLED}}
    config:
      api_key_env: "{{EVENTS_PLATFORM_ENV_KEY}}"

  crm:
    tool: "{{CRM_TOOL}}"                       # hubspot / pipedrive / odoo / notion / airtable / custom / none
    enabled: {{CRM_ENABLED}}

  image_generation:
    tool: gemini-3-pro-image-preview
    enabled: {{IMAGE_GENERATION_ENABLED}}
    skill: image-generation
    config:
      model_env: GOOGLE_AI_IMAGE_MODEL

  semantic_memory:
    tool: qdrant
    enabled: {{QDRANT_ENABLED}}
    skill: "mcp__qdrant__qdrant_search"

# ------------------------------------------------------------------------
# Enrichers — ordre d'exécution strict, contrôlable via enabled
# ------------------------------------------------------------------------
enrichers:
  hash:
    enabled: true
    algo: sha256
    normalize: true

  summary:
    enabled: true
    provider: gemini
    model: gemini-2.5-flash
    prompt: |
      Résume ce contenu {{COMPANY_NAME}} en 2 phrases maximum.
      Factuel, sans enjoliver, sans adjectif inutile. Pas de "ce texte parle de".
      Commence directement par l'information principale.
    max_output_tokens: 150
    fail_silent: true

  entities:
    enabled: true
    provider: gemini
    model: gemini-2.5-flash
    prompt: |
      Extrais de ce texte les entités suivantes, uniquement sous forme de LISTE PLATE de chaînes de caractères (pas d'objets, pas de catégories, pas d'imbrication).

      Types d'entités à extraire :
      - clients / customers mentionnés
      - membres de l'équipe / stakeholders
      - outils et produits mentionnés
      - chiffres-clés factuels (ex: "8.8/10", "100+ experts", "+19.8%")
      - lieux géographiques significatifs

      Format STRICT (une seule clé "entities", liste plate de strings) :
      {"entities": ["Client1", "Tool1", "8.8/10", "Paris"]}

      N'utilise PAS de format {"type": "...", "value": "..."}. UNIQUEMENT une liste plate.
      Pas de commentaire, pas de balise markdown, pas de texte avant ou après le JSON.
    max_output_tokens: 400
    fail_silent: true

  claims:
    enabled: true
    provider: gemini
    model: gemini-2.5-flash
    prompt: |
      Extrais de ce texte les 3 à 5 affirmations factuelles principales.
      Chaque affirmation doit être courte (max 15 mots), vérifiable, sans subjectivité, sans jugement de valeur.

      Format STRICT (une seule clé "claims", liste plate de strings) :
      {"claims": ["Affirmation 1.", "Affirmation 2.", "Affirmation 3."]}

      N'utilise PAS de format {"text": "...", "category": "..."}. UNIQUEMENT une liste plate.
      Pas de commentaire, pas de balise markdown, pas de texte avant ou après le JSON.
    max_output_tokens: 400
    fail_silent: true

  meeting:
    enabled: true
    provider: gemini
    model: gemini-2.5-flash
    applies_to_types: [transcript]
    prompt: |
      Ce document est un compte-rendu de réunion.
      Extrais les décisions prises et les actions à faire.
      Retourne un JSON : {"decisions": ["..."], "action_items": [{"who": "...", "what": "...", "when": "..."}]}
      Si pas de décision ou pas d'action, retourne une liste vide.
      Pas de commentaire, pas de balise markdown.
    max_output_tokens: 800
    fail_silent: true

# ------------------------------------------------------------------------
# Sources — ce qui est ingéré dans Qdrant
# ------------------------------------------------------------------------
sources:

  brand:
    connector: filesystem
    pattern: "01-brand/*.md"
    type: brand-doc
    channel: internal
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: sliding_window
    chunk_size_tokens: 600
    chunk_overlap_tokens: 100
    exclude_files:
      - CLAUDE.md

  newsletters:
    connector: filesystem
    pattern: "04-email/newsletter/editions/**/*.md"
    type: newsletter
    channel: newsletter
    language: "{{BRAND_DEFAULT_LANGUAGE}}"
    author: default
    status: published
    chunking: by_section_h2

  promos:
    connector: filesystem
    pattern: "04-email/promos/**/*.md"
    type: promo
    channel: email
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: whole

  sales_outreach:
    connector: filesystem
    pattern: "04-email/sales-outreach/**/*.md"
    type: sales-email
    channel: email
    language: "{{BRAND_BILINGUAL}}"
    author: sales
    status: published
    chunking: whole

  linkedin:
    connector: filesystem
    pattern: "03-social-media/linkedin/examples/**/*.md"
    type: linkedin-post
    channel: linkedin
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: whole

  discord:
    connector: filesystem
    pattern: "03-social-media/discord/examples/**/*.md"
    type: discord-post
    channel: discord
    language: "{{BRAND_DEFAULT_LANGUAGE}}"
    author: default
    status: published
    chunking: whole

  whatsapp:
    connector: filesystem
    pattern: "03-social-media/whatsapp/examples/**/*.md"
    type: whatsapp-post
    channel: whatsapp
    language: "{{BRAND_DEFAULT_LANGUAGE}}"
    author: default
    status: published
    chunking: whole

  blog:
    connector: filesystem
    pattern: "09-blog-seo/articles/**/*.md"
    type: blog-post
    channel: blog
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: by_section_h2

  landing_pages:
    connector: filesystem
    pattern: "05-web-content/**/index.html"
    type: landing-page
    channel: website
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: by_section

  notion:
    connector: notion
    database_id: "{{NOTION_EDITORIAL_DATABASE_ID}}"
    data_source_id: "{{NOTION_EDITORIAL_DATA_SOURCE_ID}}"
    status_filter: "{{EDITORIAL_CALENDAR_STATUS_FILTER}}"
    require_validated_checkbox: false
    channel_mapping: {}
    chunking: whole

  transcripts:
    connector: transcripts
    pattern: "_sources/transcriptions/**/*.md"
    type: transcript
    channel: internal
    language: "{{BRAND_DEFAULT_LANGUAGE}}"
    status: published
    chunking: by_transcript_section
    transcript_target_tokens: 800
    transcript_max_tokens: 1200
    exclude_files:
      - .DS_Store

  reports:
    connector: filesystem
    pattern: "_sources/reports/**/*.md"
    type: report-data
    channel: internal
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: by_section_h2

  research:
    connector: filesystem
    pattern: "_sources/research/**/*.md"
    type: research-note
    channel: internal
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: by_section_h2

  outline:
    connector: outline
    type: outline-doc
    language: "{{BRAND_BILINGUAL}}"
    chunking: sliding_window
    chunk_size_tokens: 600
    chunk_overlap_tokens: 100
    collections: {}   # Filled during bootstrap: {"Collection Name": "uuid-..."}

# ------------------------------------------------------------------------
# Exclusions globales
# ------------------------------------------------------------------------
global_exclusions:
  filenames:
    - CLAUDE.md
    - README.md
    - STATUS.md
    - TODO.md
    - .DS_Store
    - .gitignore
    - playbook.md
    - schedule.md
  path_contains:
    - /templates/
    - /archives/
    - /drafts/wip/
    - /wip/
    - /node_modules/
    - /.git/
    - /_bootstrap/inputs/
  filename_patterns:
    - "*[WIP]*"
    - "*_wip.*"
